version: '3.8'

services:
  web:
    build: .
    ports:
      - "8000:7860"
    environment:
      - DEBUG=False
      - ALLOWED_HOSTS=localhost,127.0.0.1,0.0.0.0
      - SECRET_KEY=your-secret-key-change-in-production
    volumes:
      - .:/app/
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    command: python manage.py runserver 0.0.0.0:7860
    networks:
      - neila-network

volumes:
  static_volume:
  media_volume:

networks:
  neila-network:
    driver: bridge
